<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you marry me? 💍</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body data-proposal-type="married">
    <div class="hearts-bg"></div>

    <div class="container result-container">
        <h1 class="hero-banner">Will you marry me? 💍</h1>

        <div class="gif-container">
            <div class="cat-stage">
                <img id="pikachu-gif" src="assets/cute-cat.svg" alt="cute cat">
            </div>
        </div>

        <p class="page-prompt">This is my forever question, so be nice to me. 💍</p>

        <div class="response-buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>

        <div id="tease-toast"></div>
        <a class="back-link" href="index.html">Back to the question</a>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="question-page.js"></script>
</body>
</html>
