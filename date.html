<body data-proposal-type="date">
    <div class="hearts-bg"></div>

    <div class="container result-container">
        <h1 class="hero-banner">Will you go on a date with me? 🎀</h1>

        <div class="gif-container">
            <div class="cat-stage">
                <img id="pikachu-gif" src="assets/story-happy.svg" alt="cute electric mascot">
            </div>
        </div>

        <p class="page-prompt">Say yes and I’ll plan something cute for us. 🎀</p>

        <div class="response-buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>

        <div id="tease-toast"></div>
        <a class="back-link" href="index.html">Back to the question</a>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="question-page.js"></script>
